<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>30-Day Program</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#f0faf4;
  --bg2:#e8f5ee;
  --surface:#ffffff;
  --surface2:#f6fdf8;
  --border:#d4edde;
  --text:#0f2419;
  --text2:#3d6b4f;
  --text3:#7aab8a;
  --g1:#16a34a;
  --g2:#15803d;
  --g3:#166534;
  --g-light:#dcfce7;
  --g-mid:#86efac;
  --blue:#2563eb;
  --blue-lt:#dbeafe;
  --amber:#d97706;
  --amber-lt:#fef3c7;
  --red:#dc2626;
  --red-lt:#fee2e2;
  --purple:#7c3aed;
  --purple-lt:#ede9fe;
  --cyan:#0891b2;
  --orange:#ea580c;
  --pink:#db2777;
  --teal:#0d9488;
  --r:18px;
  --r-sm:12px;
  --sh:0 2px 8px rgba(22,163,74,0.08),0 1px 3px rgba(0,0,0,0.04);
  --sh-md:0 8px 24px rgba(22,163,74,0.12),0 2px 8px rgba(0,0,0,0.06);
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 90px;overflow-x:hidden;}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,var(--g1) 0%,#0d9488 100%);
  padding:18px 18px 22px;
  position:sticky;top:0;z-index:50;
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.hdr-title{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;color:#fff;letter-spacing:-0.3px;}
.hdr-sub{font-size:0.68rem;color:rgba(255,255,255,0.75);font-weight:500;margin-top:1px;}
.hdr-day-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 12px;color:#fff;font-size:0.72rem;font-weight:700;}

/* Ring + stats in header */
.hdr-body{display:flex;align-items:center;gap:14px;}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
.ring-svg{width:80px;height:80px;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.2);stroke-width:7;}
.ring-fg{fill:none;stroke:#fff;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 0.6s ease;}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:900;color:#fff;line-height:1;}
.ring-lbl{font-size:0.5rem;color:rgba(255,255,255,0.8);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;}
.hdr-stats{display:flex;gap:8px;flex:1;}
.hdr-stat{flex:1;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px 6px;text-align:center;}
.hdr-stat-n{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;color:#fff;line-height:1;}
.hdr-stat-l{font-size:0.58rem;color:rgba(255,255,255,0.75);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:0.3px;}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(22,163,74,0.1);}
.nb{flex:1;padding:9px 4px 7px;text-align:center;cursor:pointer;color:var(--text3);font-size:0.58rem;font-weight:700;letter-spacing:0.2px;transition:all 0.2s;}
.nb .ni{font-size:1.2rem;display:block;margin-bottom:2px;transition:transform 0.2s;}
.nb.on{color:var(--g1);}
.nb.on .ni{transform:scale(1.15);}

/* ── PAGE ── */
.page{display:none;padding:14px;}
.page.on{display:block;}

/* ── SECTION LABEL ── */
.slbl{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin:18px 0 8px;display:block;}
.slbl:first-child{margin-top:0;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--sh);}

/* ── PHASE BANNER ── */
.phase-banner{border-radius:var(--r-sm);padding:12px 14px;margin-bottom:10px;border-left:4px solid;}
.phase-banner.g{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:var(--g1);}
.phase-banner.b{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:var(--blue);}
.phase-tag{display:inline-block;font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:20px;margin-bottom:5px;}
.phase-tag.g{background:#bbf7d0;color:#15803d;}
.phase-tag.b{background:#bfdbfe;color:#1d4ed8;}
.phase-banner p{font-size:0.75rem;color:var(--text2);line-height:1.55;}

/* ── TASK TABS ── */
.ttabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none;}
.ttabs::-webkit-scrollbar{display:none;}
.ttab{padding:6px 13px;border-radius:20px;font-size:0.72rem;font-weight:700;white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);transition:all 0.15s;}
.ttab.on{background:var(--g1);color:#fff;border-color:var(--g1);box-shadow:0 2px 8px rgba(22,163,74,0.3);}

/* ── TASKS ── */
.task-list{display:flex;flex-direction:column;gap:7px;}
.task{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all 0.15s;box-shadow:var(--sh);}
.task:active{transform:scale(0.985);}
.task.done{background:var(--g-light);border-color:var(--g-mid);opacity:0.6;}
.task.done .chk{background:var(--g1);border-color:var(--g1);}
.chk{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:0.65rem;font-weight:900;color:#fff;transition:all 0.15s;}
.task-body{flex:1;}
.task-name{font-weight:700;font-size:0.83rem;line-height:1.3;}
.task-detail{color:var(--text3);font-size:0.7rem;margin-top:2px;line-height:1.35;}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.task-time{font-size:0.62rem;font-weight:700;color:var(--text3);background:var(--bg2);padding:2px 7px;border-radius:10px;white-space:nowrap;}
.badge{font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.bv{background:#dcfce7;color:#15803d;}
.bt{background:#fef3c7;color:#92400e;}
.bb{background:#dbeafe;color:#1d4ed8;}

/* ── AVOID ── */
.avoid{background:#fff7f7;border:1.5px solid #fecaca;border-radius:var(--r-sm);padding:9px 12px;display:flex;align-items:flex-start;gap:9px;margin-bottom:6px;}
.avoid-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:4px;}
.avoid-name{font-size:0.79rem;font-weight:700;}
.avoid-detail{font-size:0.7rem;color:var(--text2);margin-top:1px;}

.sec-h{font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;}
.sec-block{margin-bottom:18px;}

.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:4px;font-size:0.68rem;color:var(--text2);}

/* ── LOG PAGE ── */
.api-ok-bar{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid var(--g-mid);border-radius:var(--r-sm);padding:11px 14px;font-size:0.76rem;color:var(--g2);font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.api-rm{color:var(--text3);font-size:0.7rem;cursor:pointer;text-decoration:underline;font-weight:500;}
.api-setup-card{background:#fff;border:1.5px solid #fde68a;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh);}
.api-setup-card h3{font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;margin-bottom:6px;}
.api-setup-card p{font-size:0.74rem;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.api-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.82rem;margin-bottom:8px;}
.api-inp::placeholder{color:var(--text3);}

/* Metric cards - health app style */
.met-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);}
.met-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.met-name{font-weight:800;font-size:0.88rem;display:flex;align-items:center;gap:7px;}
.met-goal{font-size:0.68rem;color:var(--text3);font-weight:600;}
.met-main{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.met-ring{position:relative;width:60px;height:60px;flex-shrink:0;}
.met-ring svg{width:60px;height:60px;transform:rotate(-90deg);}
.met-ring-bg{fill:none;stroke:#e8f5ee;stroke-width:6;}
.met-ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease;}
.met-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.met-ring-pct{font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:900;line-height:1;}
.met-right{flex:1;}
.met-val-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.stepper{display:flex;align-items:center;gap:2px;}
.sbtn{min-width:42px;height:32px;padding:0 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.72rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sbtn:active{background:var(--g-light);}
.sval{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;min-width:54px;text-align:center;}
.met-done-badge{font-size:0.68rem;font-weight:800;padding:3px 9px;border-radius:10px;background:#dcfce7;color:#15803d;}
.met-pct-lbl{font-size:0.68rem;font-weight:700;color:var(--text3);}
.met-track{height:5px;background:#e8f5ee;border-radius:3px;overflow:hidden;}
.met-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
.photo-row{display:flex;gap:6px;margin-top:9px;}
.pbtn{flex:1;padding:7px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.pbtn.cam{border-color:#bae6fd;color:#0284c7;background:#f0f9ff;}
.pbtn.gal{border-color:#c4b5fd;color:#7c3aed;background:#faf5ff;}

.note-ta{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.82rem;resize:none;margin-top:6px;line-height:1.5;}
.note-ta::placeholder{color:var(--text3);}

.release-card{background:linear-gradient(135deg,#faf5ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:var(--r-sm);padding:13px;}
.release-row{display:flex;justify-content:space-between;align-items:center;}
.release-lbl{font-size:0.8rem;font-weight:700;color:#5b21b6;}
.release-val{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;color:#7c3aed;}
.release-note{font-size:0.7rem;color:#6d28d9;margin-top:4px;line-height:1.4;}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--g1),var(--teal));border:none;border-radius:var(--r-sm);color:#fff;font-family:'Outfit',sans-serif;font-size:0.86rem;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(22,163,74,0.3);}
.btn-ghost{display:block;width:100%;padding:11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-family:'Outfit',sans-serif;font-size:0.79rem;font-weight:600;cursor:pointer;margin-top:8px;text-align:center;}
.btn-danger{border-color:#fca5a5;color:var(--red);background:#fff5f5;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.on{display:flex;}
.ov-box{background:#fff;border-radius:22px;padding:20px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,0.2);}
.ov-box h3{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;margin-bottom:10px;}
.ai-preview{width:100%;border-radius:12px;margin-bottom:12px;max-height:200px;object-fit:cover;}
.ai-result{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px;margin-bottom:12px;}
.ai-result-val{font-weight:800;font-size:0.93rem;color:#15803d;margin-bottom:3px;}
.ai-result-note{font-size:0.75rem;color:var(--text2);line-height:1.4;}
.ai-err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:12px;font-size:0.78rem;color:var(--red);}
.ai-loading{text-align:center;padding:24px 0;}
.spin{font-size:2rem;display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-loading p{font-size:0.8rem;color:var(--text2);margin-top:10px;}
.ov-btns{display:flex;gap:8px;}
.ov-ok{flex:1;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--g1),var(--teal));color:#fff;font-family:'Outfit',sans-serif;font-size:0.84rem;font-weight:800;cursor:pointer;}
.ov-cancel{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Outfit',sans-serif;font-size:0.84rem;font-weight:600;cursor:pointer;}

/* ── DASHBOARD ── */
.dtabs{display:flex;gap:6px;margin-bottom:14px;}
.dtab{flex:1;padding:8px 4px;border-radius:20px;font-size:0.72rem;font-weight:800;text-align:center;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);}
.dtab.on{background:var(--blue);color:#fff;border-color:var(--blue);}

.dash-h{font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:800;margin:16px 0 9px;}
.dash-h:first-child{margin-top:0;}

/* Weekly bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px;margin-bottom:5px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height 0.4s ease;}
.bar-v{font-size:0.54rem;color:var(--g1);font-weight:800;}
.bar-l{font-size:0.56rem;color:var(--text3);font-weight:700;}

/* Metric trend cards */
.met-trend{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;box-shadow:var(--sh);}
.mt-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.mt-name{font-weight:800;font-size:0.83rem;}
.mt-avg{font-size:0.78rem;font-weight:800;}
.mini-bars{display:flex;gap:3px;align-items:flex-end;height:36px;}
.mini-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px;}
.cal-lbl{font-size:0.6rem;font-weight:800;color:var(--text3);text-align:center;padding-bottom:3px;}
.cal-cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:1.5px solid var(--border);}
.cal-cell.today{border-color:var(--g1);border-width:2px;background:var(--g-light);}
.cal-cell.good{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#86efac;}
.cal-cell.ok{background:#f0fdf4;border-color:#bbf7d0;}
.cal-cell.future{opacity:0.25;}
.cal-n{font-size:0.7rem;font-weight:800;}
.cal-p{font-size:0.5rem;color:var(--g1);font-weight:700;}

/* History */
.hist-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:8px;box-shadow:var(--sh);}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.hist-date{font-weight:800;font-size:0.82rem;}
.hist-day{font-size:0.65rem;color:var(--text3);font-weight:600;margin-top:1px;}
.hist-pct{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;color:var(--g1);}
.hist-track{height:5px;background:#e8f5ee;border-radius:3px;overflow:hidden;margin-bottom:7px;}
.hist-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g1),var(--teal));}
.hist-chips{display:flex;gap:5px;flex-wrap:wrap;}
.hist-chip{font-size:0.65rem;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:8px;border:1px solid var(--border);font-weight:600;}
.hist-note{margin-top:7px;font-size:0.72rem;color:var(--text2);font-style:italic;line-height:1.4;}

.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:0.82rem;}
.empty .em{font-size:2.4rem;margin-bottom:8px;}

/* ── COACH ── */
.coach-hero{background:linear-gradient(135deg,var(--g1) 0%,#0d9488 100%);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--sh-md);}
.coach-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.coach-av{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.coach-title-txt{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;color:#fff;}
.coach-sub{font-size:0.69rem;color:rgba(255,255,255,0.75);font-weight:600;margin-top:2px;}
.coach-scores{display:flex;gap:8px;}
.coach-sc{flex:1;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:12px;padding:10px 6px;text-align:center;}
.coach-sc-n{font-family:'Nunito',sans-serif;font-size:1.35rem;font-weight:900;color:#fff;line-height:1;}
.coach-sc-l{font-size:0.59rem;color:rgba(255,255,255,0.75);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:0.3px;}

.met-status-list{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.ms-row{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);font-size:0.8rem;}
.ms-row:last-child{border-bottom:none;}
.ms-name{display:flex;align-items:center;gap:7px;font-weight:700;}
.ms-val-lbl{font-size:0.69rem;color:var(--text3);font-weight:500;}
.ms-badge{font-size:0.67rem;font-weight:800;padding:3px 9px;border-radius:10px;}
.ms-great{background:#dcfce7;color:#15803d;}
.ms-ok{background:#fef9c3;color:#854d0e;}
.ms-low{background:#fee2e2;color:#b91c1c;}
.ms-none{background:#f1f5f9;color:#64748b;}

.gen-btn{width:100%;padding:15px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--g1),var(--teal));color:#fff;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 16px rgba(22,163,74,0.3);}
.gen-btn:disabled{opacity:0.6;cursor:not-allowed;}
.gen-btn:active{transform:scale(0.99);}
.coach-no-key{background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(--r-sm);padding:13px;font-size:0.77rem;color:#92400e;line-height:1.5;margin-bottom:12px;text-align:center;}
.summary-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);}

<body>

<!-- Header with ring -->
<header class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">30-Day Program</div>
      <div class="hdr-sub">Volume · Taste · Daily Tracking</div>
    </div>
    <div class="hdr-day-badge" id="day-badge">Day 1/30</div>
  </div>
  <div class="hdr-body">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="32"/>
        <circle class="ring-fg" id="hdr-ring" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"/>
      </svg>
      <div class="ring-label">
        <div class="ring-pct" id="hdr-pct">0%</div>
        <div class="ring-lbl">Tasks</div>
      </div>
    </div>
    <div class="hdr-stats">
      <div class="hdr-stat"><div class="hdr-stat-n" id="hdr-streak">0</div><div class="hdr-stat-l">🔥 Streak</div></div>
      <div class="hdr-stat"><div class="hdr-stat-n" id="hdr-best">0%</div><div class="hdr-stat-l">⭐ Best</div></div>
      <div class="hdr-stat"><div class="hdr-stat-n" id="hdr-avg">0%</div><div class="hdr-stat-l">📊 Avg</div></div>
    </div>
  </div>
</header>

<input type="file" id="file-cam" accept="image/*" capture="user">
<input type="file" id="file-gal" accept="image/*">

<div class="overlay" id="ai-overlay">
  <div class="ov-box">
    <h3 id="ov-title">Analysing...</h3>
    <div id="ov-body"></div>
  </div>
</div>

<div class="page on" id="pg-today"><div id="today-content"></div></div>
<div class="page" id="pg-log"><div id="log-content"></div></div>
<div class="page" id="pg-dash"><div id="dash-content"></div></div>
<div class="page" id="pg-history"><div id="history-content"></div></div>
<div class="page" id="pg-coach"><div id="coach-content"></div></div>

<nav class="nav">
  <div class="nb on" id="bn-today" onclick="nav('today')"><span class="ni">✅</span>Today</div>
  <div class="nb" id="bn-log" onclick="nav('log')"><span class="ni">📝</span>Log</div>
  <div class="nb" id="bn-dash" onclick="nav('dash')"><span class="ni">📊</span>Dashboard</div>
  <div class="nb" id="bn-history" onclick="nav('history')"><span class="ni">📅</span>History</div>
  <div class="nb" id="bn-coach" onclick="nav('coach')"><span class="ni">🤖</span>Coach</div>
</nav>

<script>
'use strict';

// ── TASK DATA ────────────────────────────────────────────────
const TASKS = {
  morning:{label:'🌅 Morning',sections:[{title:'Wake Up',icon:'🌤️',bg:'#fef9c3',items:[
    {name:'500ml water immediately',detail:'Before anything else — rehydrate after sleep',time:'6:30 AM',tag:'both'},
    {name:'Pineapple smoothie',detail:'1 cup pineapple + berries + banana + water',time:'6:45 AM',tag:'taste'},
    {name:'3 stalks celery (or juice)',detail:'On empty stomach. Apigenin supports testosterone.',time:'7:00 AM',tag:'vol'},
    {name:'Take all supplements',detail:'Zinc · Lecithin · Vit D · Multivitamin',time:'7:30 AM',tag:'vol'},
    {name:'High-protein breakfast',detail:'Eggs, pumpkin seeds, oats. Add cinnamon for taste.',time:'7:30 AM',tag:'both'},
  ]}]},
  daytime:{label:'☀️ Daytime',sections:[
    {title:'Hydration',icon:'💧',bg:'#dbeafe',items:[
      {name:'Mid-morning water (500ml)',detail:'Hydration is key — stay topped up throughout the day.',time:'10:00 AM',tag:'both'},
      {name:'Afternoon water (500ml)',detail:'Keep a bottle with you',time:'1:00 PM',tag:'both'},
      {name:'Pre-dinner water (500ml)',detail:'Hydrate before your evening meal',time:'5:30 PM',tag:'both'},
    ]},
    {title:'Meals',icon:'🥗',bg:'#dcfce7',items:[
      {name:'Citrus fruit serving',detail:'Orange, grapefruit, or kiwi. Vitamin C + sweetness.',time:'11:00 AM',tag:'taste'},
      {name:'High-protein zinc-rich lunch',detail:'Fish or chicken (150g+) + chickpeas + leafy greens',time:'12:30 PM',tag:'both'},
      {name:'Omega-3 + Vitamin C supplement',detail:'1,000mg fish oil + 500mg Vit C with lunch',time:'12:30 PM',tag:'vol'},
      {name:'Afternoon snack',detail:'Berries, watermelon, pumpkin seeds, or Brazil nuts',time:'3:30 PM',tag:'both'},
      {name:'Nutrient-dense dinner',detail:'Salmon + leafy greens + quinoa or sweet potato',time:'7:00 PM',tag:'both'},
    ]}
  ]},
  supps:{label:'💊 Supplements',sections:[
    {title:'Morning',icon:'🌅',bg:'#ede9fe',items:[
      {name:'Zinc — 30mg',detail:'Core for reproductive health. Take with food.',time:'Breakfast',tag:'vol'},
      {name:'Lecithin — 1,200mg',detail:'Most cited supplement for volume specifically.',time:'Breakfast',tag:'vol'},
      {name:'Vitamin D — 2,000 IU',detail:'Supports testosterone production.',time:'Breakfast',tag:'vol'},
      {name:'Multivitamin',detail:'Fills folate, vitamin E, selenium gaps.',time:'Breakfast',tag:'vol'},
    ]},
    {title:'Midday',icon:'☀️',bg:'#dbeafe',items:[
      {name:'Omega-3 / Fish Oil — 1,000mg',detail:'Reproductive health and hormone balance.',time:'Lunch',tag:'vol'},
      {name:'Vitamin C — 500mg',detail:'Antioxidant protection. Skip if eating citrus.',time:'Lunch',tag:'vol'},
    ]},
  ]},
  exercise:{label:'🏋️ Exercise',sections:[
    {title:'Daily Movement',icon:'💪',bg:'#fee2e2',items:[
      {name:'Workout (40–60 min)',detail:'Strength or cardio. Compound lifts boost testosterone.',time:'Morning/PM',tag:'vol'},
      {name:'7,000+ steps',detail:'Movement supports circulation and hormone balance.',time:'All day',tag:'vol'},
      {name:'10 min stretch / mobility',detail:'Hip openers, lower body. Pelvic blood flow.',time:'Post-workout',tag:'vol'},
    ]},
    {title:'Weekly Plan',icon:'📅',bg:'#dbeafe',items:[
      {name:'Mon/Wed/Fri — Strength',detail:'Squats, deadlifts, bench, rows.',time:'40–50 min',tag:'vol'},
      {name:'Tue/Thu — Cardio',detail:'Jogging, cycling, or swimming.',time:'30–40 min',tag:'vol'},
      {name:'Sat — Active recovery',detail:'Light walk, yoga, or stretching.',time:'30 min',tag:'vol'},
      {name:'Sun — Full rest',detail:'Recovery is when hormones rebuild.',time:'Rest',tag:'vol'},
    ]}
  ]},
  evening:{label:'🌙 Evening',sections:[
    {title:'Wind Down',icon:'🌙',bg:'#ede9fe',items:[
      {name:'Evening water (500ml)',detail:'Finish 1hr before bed.',time:'8:00 PM',tag:'both'},
      {name:'Dim lights by 9 PM',detail:'Signals melatonin. Avoid bright overhead lights.',time:'9:00 PM',tag:'vol'},
      {name:'No screens 30 min before bed',detail:'Blue light suppresses melatonin and deep sleep.',time:'9:30 PM',tag:'vol'},
      {name:'Cool bedroom (18–20°C)',detail:'Supports testosterone production during sleep.',time:'Before bed',tag:'vol'},
      {name:'Loose boxers or sleep naked',detail:'Keep testicular temperature cool overnight.',time:'Bedtime',tag:'vol'},
      {name:'7–9 hours sleep',detail:'Most testosterone is made during deep sleep.',time:'10:00 PM',tag:'vol'},
    ]},
    {title:'Avoid Daily',icon:'🚫',bg:'#fee2e2',avoids:[
      {text:'Alcohol',detail:'Lowers testosterone AND worsens taste',tag:'both'},
      {text:'Smoking / nicotine',detail:'Reduces blood flow to reproductive organs',tag:'vol'},
      {text:'Red meat as main protein',detail:'Swap for fish or chicken — better for taste',tag:'taste'},
      {text:'Asparagus, garlic, raw onion',detail:'Sulfur compounds strongly affect taste',tag:'taste'},
      {text:'Junk food / processed food',detail:'High sodium worsens taste significantly',tag:'taste'},
      {text:'Caffeine after 2 PM',detail:'Protects sleep quality. Morning coffee is fine.',tag:'vol'},
      {text:'Laptop on lap / hot baths',detail:'Prolonged heat damages sperm production.',tag:'vol'},
    ]}
  ]}
};
const TABS = ['morning','daytime','supps','exercise','evening'];

// ── METRICS ─────────────────────────────────────────────────
const METRICS = [
  {id:'water',name:'Water',icon:'💧',unit:'ml',target:2500,step:250,max:4000,color:'#0ea5e9',hint:'Water bottles, glasses. Standard glass=250ml, small bottle=500ml, large=750ml.'},
  {id:'protein',name:'Protein',icon:'🥩',unit:'g',target:150,step:5,max:300,color:'#ef4444',hint:'Food labels, MyFitnessPal screenshots, meal photos. Chicken breast 150g≈45g, egg≈6g, protein shake≈25g.'},
  {id:'sleep',name:'Sleep',icon:'😴',unit:'hrs',target:8,step:0.5,max:12,color:'#8b5cf6',hint:'Apple Health, Fitbit, Oura sleep screenshots. Find total sleep hours.'},
  {id:'steps',name:'Steps',icon:'🚶',unit:'k',target:7,step:0.5,max:25,color:'#16a34a',hint:'Apple Watch, iPhone Health step count. Return in thousands (8500=8.5).'},
  {id:'pineapple',name:'Pineapple',icon:'🍍',unit:'cups',target:1,step:0.5,max:3,color:'#eab308',hint:'Pineapple fruit, juice, smoothies. Estimate cups consumed.'},
  {id:'celery',name:'Celery',icon:'🥬',unit:'stalks',target:3,step:1,max:8,color:'#22c55e',hint:'Celery stalks, juice. Count stalks or estimate from juice glass (≈4 stalks).'},
  {id:'workout',name:'Workout',icon:'🏋️',unit:'min',target:45,step:5,max:120,color:'#f97316',hint:'Gym photos, Nike Run, Strava, Apple Fitness screenshots. Estimate workout minutes.'},
  {id:'mood',name:'Energy/Mood',icon:'⚡',unit:'/10',target:7,step:1,max:10,color:'#06b6d4',hint:'Mood tracking apps, wellness screenshots. Rate 1-10.'},
];

// ── STATE ───────────────────────────────────────────────────
let state={checked:{},history:{},startDate:null,apiKey:'',release:{lastDate:null}};
let curPage='today',curTab='morning',dashPeriod='daily';
let aiMetric=null,aiPending=null;

const STORE='prog_v9';
const OLD_STORES=['prog_v8','opt_prog_v6','opt_prog_v5'];

function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function load(){
  let raw=null;
  try{raw=localStorage.getItem(STORE);}catch(e){}
  if(!raw){for(const k of OLD_STORES){try{const o=localStorage.getItem(k);if(o){raw=o;break;}}catch(e){}}}
  if(raw){
    try{
      const d=JSON.parse(raw);
      state.checked=d.checked||{};state.history=d.history||{};
      state.startDate=d.startDate||todayKey();state.apiKey=d.apiKey||'';
      state.release=d.release||{lastDate:null};
      Object.keys(state.history).forEach(k=>{if(!state.history[k].coachSummary)state.history[k].coachSummary='';});
    }catch(e){state.startDate=todayKey();}
  }else{state.startDate=todayKey();}
}

function save(){
  try{
    const t=todayKey();
    if(!state.history[t])state.history[t]={pct:0,metrics:{},note:'',coachSummary:''};
    state.history[t].pct=calcPct();
    localStorage.setItem(STORE,JSON.stringify(state));
  }catch(e){console.error('Save failed',e);}
}

function getTM(){const t=todayKey();return(state.history[t]&&state.history[t].metrics)?state.history[t].metrics:{};}
function setMetric(id,val){const t=todayKey();if(!state.history[t])state.history[t]={pct:0,metrics:{},note:'',coachSummary:''};state.history[t].metrics[id]=val;save();}
function getNote(){const t=todayKey();return(state.history[t]&&state.history[t].note)?state.history[t].note:'';}
function setNote(v){const t=todayKey();if(!state.history[t])state.history[t]={pct:0,metrics:{},note:'',coachSummary:''};state.history[t].note=v;save();}
function daysSinceRelease(){if(!state.release.lastDate)return null;const last=new Date(state.release.lastDate+'T00:00:00');const now=new Date();now.setHours(0,0,0,0);return Math.floor((now-last)/86400000);}

// ── CALC ────────────────────────────────────────────────────
function tid(tab,si,ti){return`${tab}_${si}_${ti}`;}
function allTids(){const ids=[];Object.entries(TASKS).forEach(([tab,d])=>d.sections.forEach((s,si)=>(s.items||[]).forEach((_,ti)=>ids.push(tid(tab,si,ti)))));return ids;}
function calcPct(){const a=allTids();return Math.round(a.filter(i=>state.checked[i]).length/a.length*100);}
function calcStreak(){let s=0;const d=new Date();d.setDate(d.getDate()-1);while(true){const k=fmtKey(d);if(state.history[k]&&state.history[k].pct>=50){s++;d.setDate(d.getDate()-1);}else break;}if(state.history[todayKey()]&&state.history[todayKey()].pct>=50)s++;return s;}
function calcBest(){return Object.values(state.history).reduce((b,h)=>Math.max(b,h.pct||0),0);}
function calcAvg(){const e=Object.values(state.history).filter(h=>h.pct>0);return e.length?Math.round(e.reduce((s,h)=>s+(h.pct||0),0)/e.length):0;}
function calcDay(){if(!state.startDate)return 1;return Math.min(Math.max(Math.floor((new Date()-new Date(state.startDate+'T00:00:00'))/86400000)+1,1),30);}
function dayLabel(k){return new Date(k+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function getDayNum(k){if(!state.startDate)return'?';return Math.floor((new Date(k+'T00:00:00')-new Date(state.startDate+'T00:00:00'))/86400000)+1;}

// ── HEADER UPDATE ────────────────────────────────────────────
function updateHeader(){
  const p=calcPct(),day=calcDay();
  document.getElementById('hdr-pct').textContent=p+'%';
  document.getElementById('hdr-streak').textContent=calcStreak();
  document.getElementById('hdr-best').textContent=calcBest()+'%';
  document.getElementById('hdr-avg').textContent=calcAvg()+'%';
  document.getElementById('day-badge').textContent=`Day ${day}/30`;
  const circ=Math.PI*2*32;
  const offset=circ-(p/100)*circ;
  document.getElementById('hdr-ring').style.strokeDashoffset=offset;
}

// ── NAV ──────────────────────────────────────────────────────
function nav(page){
  curPage=page;
  ['today','log','dash','history','coach'].forEach(p=>{
    document.getElementById('pg-'+p).classList.toggle('on',p===page);
    document.getElementById('bn-'+p).classList.toggle('on',p===page);
  });
  if(page==='today')renderToday();
  else if(page==='log')renderLog();
  else if(page==='dash')renderDash();
  else if(page==='history')renderHistory();
  else renderCoach();
  updateHeader();
}

function badge(tag){const m={vol:['bv','📈'],taste:['bt','🍍'],both:['bb','⚡']};const[c,l]=m[tag]||[];return c?`<span class="badge ${c}">${l}</span>`:'';}

// ── TODAY ────────────────────────────────────────────────────
function switchTab(t){curTab=t;renderToday();}
function toggleTask(tab,si,ti){const k=tid(tab,si,ti);state.checked[k]=!state.checked[k];save();renderToday();updateHeader();}

function renderToday(){
  const day=calcDay(),isP1=day<=14,data=TASKS[curTab];
  let h=`
    <div class="phase-banner ${isP1?'g':'b'}">
      <div class="phase-tag ${isP1?'g':'b'}">${isP1?'Phase 1 — Foundation':'Phase 2 — Optimise'}</div>
      <p>${isP1?'Lock in hydration, supplements, sleep & loose underwear. Pineapple smoothie every morning.':'Everything from phase 1 continues. Add exercise. Abstain 2–3 days. Taste changes in 3–5 days.'}</p>
    </div>
    <div class="legend">
      <div class="leg"><span class="badge bv">📈</span> Volume</div>
      <div class="leg"><span class="badge bt">🍍</span> Taste</div>
      <div class="leg"><span class="badge bb">⚡</span> Both</div>
    </div>
    <div class="ttabs">${TABS.map(t=>`<div class="ttab ${t===curTab?'on':''}" onclick="switchTab('${t}')">${TASKS[t].label}</div>`).join('')}</div>`;

  data.sections.forEach((sec,si)=>{
    h+=`<div class="sec-block"><div class="sec-h"><div class="sec-icon" style="background:${sec.bg}">${sec.icon}</div>${sec.title}</div>`;
    if(sec.items){
      h+=`<div class="task-list">`;
      sec.items.forEach((item,ti)=>{
        const k=tid(curTab,si,ti),done=state.checked[k];
        h+=`<div class="task ${done?'done':''}" onclick="toggleTask('${curTab}',${si},${ti})">
          <div class="chk">${done?'✓':''}</div>
          <div class="task-body"><div class="task-name">${item.name}</div><div class="task-detail">${item.detail}</div></div>
          <div class="task-right"><span class="task-time">${item.time}</span>${badge(item.tag)}</div>
        </div>`;
      });
      h+=`</div>`;
    }
    if(sec.avoids){sec.avoids.forEach(a=>{h+=`<div class="avoid"><div class="avoid-dot"></div><div><div class="avoid-name">❌ ${a.text}</div><div class="avoid-detail">${a.detail}</div></div>${badge(a.tag)}</div>`;});}
    h+=`</div>`;
  });
  h+=`<button class="btn-ghost" onclick="resetToday()">↻ Reset today's checkboxes</button>`;
  document.getElementById('today-content').innerHTML=h;
}

// ── LOG ──────────────────────────────────────────────────────
function stepMetric(id,delta){
  const m=METRICS.find(x=>x.id===id);
  const cur=getTM()[id]||0;
  const nv=Math.max(0,Math.min(m.max,Math.round((cur+delta)*10)/10));
  setMetric(id,nv);renderLog();
}
function saveApiKey(){const v=document.getElementById('api-inp').value.trim();if(!v.startsWith('sk-ant-')){alert('Key should start with sk-ant-');return;}state.apiKey=v;save();renderLog();}
function clearApiKey(){state.apiKey='';save();renderLog();}
function saveNote(){const ta=document.getElementById('note-ta');if(ta)setNote(ta.value);const btn=document.getElementById('note-save-btn');if(btn){btn.textContent='✓ Saved';setTimeout(()=>btn.textContent='💾 Save Note',1500);}}
function recordRelease(){state.release.lastDate=todayKey();save();renderLog();}
function resetLog(){const t=todayKey();if(state.history[t]){state.history[t].metrics={};state.history[t].note='';}save();renderLog();}

function renderLog(){
  const m=getTM(),note=getNote(),dsr=daysSinceRelease();
  let h='';

  if(state.apiKey){
    h+=`<div class="api-ok-bar">🔑 API key saved — photo capture enabled <span class="api-rm" onclick="clearApiKey()">Remove</span></div>`;
  }else{
    h+=`<div class="api-setup-card">
      <h3>🔑 Enable Photo Capture</h3>
      <p>Enter your Anthropic API key to let Claude read your photos and auto-fill metrics. Stored only on your device.</p>
      <input type="password" class="api-inp" id="api-inp" placeholder="sk-ant-api03-...">
      <button class="btn-primary" onclick="saveApiKey()">Save API Key</button>
      <p style="margin-top:7px;font-size:0.7rem;color:var(--text3);">Get your key at console.anthropic.com · Each photo scan costs &lt;$0.01</p>
    </div>`;
  }

  h+=`<span class="slbl">Daily Metrics</span>`;

  METRICS.forEach(met=>{
    const val=m[met.id]!==undefined?m[met.id]:0;
    const pct=Math.min(100,Math.round((val/met.target)*100));
    const done=val>=met.target;
    const circ=Math.PI*2*24;
    const offset=circ-(pct/100)*circ;
    h+=`<div class="met-card">
      <div class="met-header">
        <div class="met-name">${met.icon} ${met.name}</div>
        <div class="met-goal">Goal: ${met.target} ${met.unit}</div>
      </div>
      <div class="met-main">
        <div class="met-ring">
          <svg viewBox="0 0 60 60" width="60" height="60" style="transform:rotate(-90deg)">
            <circle class="met-ring-bg" cx="30" cy="30" r="24"/>
            <circle class="met-ring-fg" cx="30" cy="30" r="24" stroke="${met.color}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="met-ring-center">
            <div class="met-ring-pct" style="color:${done?met.color:'#94a3b8'}">${pct}%</div>
          </div>
        </div>
        <div class="met-right">
          <div class="met-val-row">
            <div class="stepper">
              <button class="sbtn" onclick="stepMetric('${met.id}',-${met.step})" title="Remove ${met.step} ${met.unit}">−${met.step}</button>
              <div class="sval" style="color:${done?met.color:'var(--text)'}">${val}<span style="font-size:0.6rem;font-weight:600;color:var(--text3)"> ${met.unit}</span></div>
              <button class="sbtn" onclick="stepMetric('${met.id}',${met.step})" title="Add ${met.step} ${met.unit}">+${met.step}</button>
            </div>
            ${done?`<span class="met-done-badge">✓ Done</span>`:`<span class="met-pct-lbl">${pct}% of goal</span>`}
          </div>
          <div class="met-track"><div class="met-fill" style="width:${pct}%;background:${met.color}"></div></div>
        </div>
      </div>
      ${state.apiKey?`<div class="photo-row"><button class="pbtn cam" onclick="openCam('${met.id}')">📷 Camera</button><button class="pbtn gal" onclick="openGal('${met.id}')">🖼 Gallery</button></div>`:''}
    </div>`;
  });

  h+=`<span class="slbl">Daily Note</span>
    <div class="card">
      <textarea class="note-ta" id="note-ta" rows="3" placeholder="How are you feeling? Taste changes, energy, observations...">${note}</textarea>
      <button class="btn-primary" id="note-save-btn" onclick="saveNote()" style="margin-top:8px;">💾 Save Note</button>
    </div>`;

  h+=`<span class="slbl">Private Tracker</span>
    <div class="card">
      <div class="release-card">
        <div class="release-row">
          <div class="release-lbl">🗓️ Days since last release</div>
          <div class="release-val">${dsr!==null?dsr+' days':'—'}</div>
        </div>
        <div class="release-note">${dsr===null?'Not recorded yet.'
          :dsr<2?'Too soon — wait at least 2–3 days for best volume.'
          :dsr<=4?'✓ Optimal window for maximum volume.'
          :'Getting long — consider this in your planning.'}</div>
        <button class="btn-ghost" style="margin-top:10px;" onclick="recordRelease()">Record today as last release</button>
      </div>
    </div>`;

  h+=`<button class="btn-ghost btn-danger" onclick="resetLog()">↻ Reset today's metrics</button>`;
  document.getElementById('log-content').innerHTML=h;
}

// ── PHOTO AI ─────────────────────────────────────────────────
function openCam(id){if(!state.apiKey){alert('Add your API key first.');return;}aiMetric=id;document.getElementById('file-cam').click();}
function openGal(id){if(!state.apiKey){alert('Add your API key first.');return;}aiMetric=id;document.getElementById('file-gal').click();}
document.getElementById('file-cam').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';});
document.getElementById('file-gal').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';});
function handleFile(file){if(!file)return;const r=new FileReader();r.onload=ev=>analyseImage(ev.target.result,aiMetric);r.readAsDataURL(file);}

async function analyseImage(dataUrl,metId){
  const met=METRICS.find(x=>x.id===metId);
  const overlay=document.getElementById('ai-overlay');
  const title=document.getElementById('ov-title');
  const body=document.getElementById('ov-body');
  overlay.classList.add('on');
  title.textContent=`📸 Analysing for ${met.name}...`;
  body.innerHTML=`<img src="${dataUrl}" class="ai-preview"><div class="ai-loading"><span class="spin">⚙️</span><p>Claude is reading your photo...</p></div>`;
  try{
    const b64=dataUrl.split(',')[1],mime=dataUrl.split(';')[0].split(':')[1];
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:300,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:`Extract health metric data from this image.\nMetric: ${met.name} (${met.unit})\nHint: ${met.hint}\nRespond ONLY with valid JSON, no markdown: {"value":<number>,"confidence":"high|medium|low","explanation":"<one sentence>"}\nIf uncertain: {"value":0,"confidence":"low","explanation":"Could not determine from image"}`}
      ]}]})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API error');}
    const data=await resp.json();
    let raw=data.content[0].text.trim();
    raw=raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/i,'').trim();
    const result=JSON.parse(raw);
    aiPending=result.value;
    const cc=result.confidence==='high'?'var(--g1)':result.confidence==='medium'?'var(--amber)':'var(--orange)';
    const existing=getTM()[metId]||0;
    const newTotal=Math.round((existing+result.value)*10)/10;
    body.innerHTML=`<img src="${dataUrl}" class="ai-preview">
      <div class="ai-result">
        <div class="ai-result-val">${met.icon} Detected: <strong>+${result.value} ${met.unit}</strong></div>
        ${existing>0?`<div style="font-size:0.75rem;color:#15803d;font-weight:700;margin-top:4px;">Running total: ${existing} + ${result.value} = <strong>${newTotal} ${met.unit}</strong></div>`:''}
        <div class="ai-result-note" style="margin-top:5px;">${result.explanation}</div>
        <div style="font-size:0.68rem;margin-top:5px;color:${cc};font-weight:700;">Confidence: ${result.confidence}</div>
      </div>
      <div class="ov-btns">
        <button class="ov-ok" onclick="confirmAi('${metId}')">✓ Add to total</button>
        <button class="ov-cancel" onclick="closeOverlay()">Cancel</button>
      </div>`;
    title.textContent='✨ AI Result';
  }catch(err){
    body.innerHTML=`<img src="${dataUrl}" class="ai-preview"><div class="ai-err">⚠️ ${err.message}</div><div class="ov-btns"><button class="ov-cancel" style="flex:1" onclick="closeOverlay()">Close</button></div>`;
    title.textContent='❌ Failed';
  }
}
function confirmAi(id){
  if(aiPending!==null){
    const m=METRICS.find(x=>x.id===id);
    const existing=getTM()[id]||0;
    const newVal=Math.min(m.max, Math.round((existing+aiPending)*10)/10);
    setMetric(id,newVal);
  }
  closeOverlay();renderLog();
}
function closeOverlay(){document.getElementById('ai-overlay').classList.remove('on');aiMetric=null;aiPending=null;}

// ── DASHBOARD ────────────────────────────────────────────────
function setDash(p){dashPeriod=p;renderDash();}
function getDashEntries(){
  const today=new Date();today.setHours(0,0,0,0);
  return Object.entries(state.history).filter(([k])=>{
    const d=new Date(k+'T00:00:00');
    if(dashPeriod==='daily'){const d7=new Date(today);d7.setDate(today.getDate()-6);return d>=d7&&d<=today;}
    if(dashPeriod==='weekly'){const d28=new Date(today);d28.setDate(today.getDate()-27);return d>=d28&&d<=today;}
    return true;
  }).sort((a,b)=>a[0].localeCompare(b[0]));
}

function renderDash(){
  const entries=getDashEntries();
  let h=`
    <div class="dtabs">
      <div class="dtab ${dashPeriod==='daily'?'on':''}" onclick="setDash('daily')">7 Days</div>
      <div class="dtab ${dashPeriod==='weekly'?'on':''}" onclick="setDash('weekly')">4 Weeks</div>
      <div class="dtab ${dashPeriod==='monthly'?'on':''}" onclick="setDash('monthly')">Full 30</div>
    </div>`;

  h+=`<div class="dash-h">✅ Completion Score</div>`;
  if(!entries.length){
    h+=`<div class="empty"><div class="em">📊</div>No data yet for this period.</div>`;
  }else{
    h+=`<div class="card"><div class="bar-chart">`;
    entries.forEach(([k,v])=>{
      const p=v.pct||0,bh=Math.max(4,Math.round((p/100)*80));
      const d=new Date(k+'T00:00:00');
      const lbl=dashPeriod==='daily'?d.toLocaleDateString('en-GB',{weekday:'short'}):dashPeriod==='weekly'?d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}):`D${getDayNum(k)}`;
      const col=p>=80?'var(--g1)':p>=50?'var(--g-mid)':'#e2e8f0';
      h+=`<div class="bar-col"><div class="bar-v">${p>0?p+'%':''}</div><div class="bar" style="height:${bh}px;background:${col}"></div><div class="bar-l">${lbl}</div></div>`;
    });
    h+=`</div></div>`;

    h+=`<div class="dash-h">📈 Metric Trends</div>`;
    METRICS.forEach(met=>{
      const vals=entries.map(([,v])=>v.metrics&&v.metrics[met.id]!==undefined?v.metrics[met.id]:null).filter(x=>x!==null);
      if(!vals.length)return;
      const avg=Math.round((vals.reduce((s,v)=>s+v,0)/vals.length)*10)/10;
      const pct=Math.min(100,Math.round((avg/met.target)*100));
      const maxV=Math.max(...vals,met.target);
      h+=`<div class="met-trend">
        <div class="mt-top"><div class="mt-name">${met.icon} ${met.name}</div><div class="mt-avg" style="color:${met.color}">avg ${avg} ${met.unit}</div></div>
        <div class="mini-bars">${vals.map(v=>`<div class="mini-bar" style="height:${Math.max(2,Math.round((v/maxV)*34))}px;background:${v>=met.target?met.color:'#e8f5ee'};flex:1"></div>`).join('')}</div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <div style="font-size:0.66rem;color:var(--text3)">Target: ${met.target} ${met.unit}</div>
          <div style="font-size:0.66rem;color:${pct>=100?'var(--g1)':'var(--text3)'};">${pct}% of target</div>
        </div>
      </div>`;
    });
  }

  h+=`<div class="dash-h">📅 30-Day Calendar</div><div class="cal-grid">`;
  ['M','T','W','T','F','S','S'].forEach(d=>{h+=`<div class="cal-lbl">${d}</div>`;});
  const start=state.startDate?new Date(state.startDate+'T00:00:00'):new Date();
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const sdow=(start.getDay()+6)%7;
  for(let i=0;i<sdow;i++)h+=`<div></div>`;
  for(let i=0;i<30;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);d.setHours(0,0,0,0);
    const k=fmtKey(d),isT=d.getTime()===todayD.getTime(),isFut=d>todayD;
    const rec=state.history[k],p=rec?rec.pct:0;
    let cls='cal-cell';
    if(isFut)cls+=' future';else if(p>=80)cls+=' good';else if(p>=1)cls+=' ok';
    if(isT)cls+=' today';
    h+=`<div class="${cls}"><div class="cal-n">${i+1}</div>${p>0?`<div class="cal-p">${p}%</div>`:''}</div>`;
  }
  h+=`</div>`;
  document.getElementById('dash-content').innerHTML=h;
}

// ── HISTORY ──────────────────────────────────────────────────
function renderHistory(){
  const entries=Object.entries(state.history).sort((a,b)=>b[0].localeCompare(a[0]));
  let h=`<span class="slbl">Daily Records</span>`;
  if(!entries.length){
    h+=`<div class="empty"><div class="em">📋</div>No records yet.<br>Complete tasks and log metrics to build your history.</div>`;
  }else{
    entries.forEach(([k,v])=>{
      const p=v.pct||0,mets=v.metrics||{};
      const chips=Object.keys(mets).filter(id=>mets[id]>0).map(id=>{const met=METRICS.find(x=>x.id===id);return met?`<div class="hist-chip">${met.icon} ${mets[id]} ${met.unit}</div>`:''}).join('');
      h+=`<div class="hist-card">
        <div class="hist-top"><div><div class="hist-date">${dayLabel(k)}</div><div class="hist-day">Day ${getDayNum(k)} of 30</div></div><div class="hist-pct">${p}%</div></div>
        <div class="hist-track"><div class="hist-fill" style="width:${p}%"></div></div>
        ${chips?`<div class="hist-chips">${chips}</div>`:''}
        ${v.note?`<div class="hist-note">"${v.note}"</div>`:''}
      </div>`;
    });
  }
  h+=`<button class="btn-ghost btn-danger" onclick="confirmClear()">🗑 Clear all history</button>`;
  document.getElementById('history-content').innerHTML=h;
}

// ── COACH ────────────────────────────────────────────────────
function renderCoach(){
  const tm=getTM(),p=calcPct(),day=calcDay(),today=todayKey();
  const saved=state.history[today]&&state.history[today].coachSummary;
  let hit=0;
  const rows=METRICS.map(met=>{
    const val=tm[met.id]!==undefined?tm[met.id]:null;
    const pct=val!==null&&val>0?Math.round((val/met.target)*100):null;
    let cls,txt;
    if(!val||val===0){cls='ms-none';txt='Not logged';}
    else if(pct>=100){cls='ms-great';txt='✓ Met';hit++;}
    else if(pct>=60){cls='ms-ok';txt=pct+'%';}
    else{cls='ms-low';txt=pct+'%';}
    return`<div class="ms-row"><div class="ms-name">${met.icon} ${met.name}${val&&val>0?` <span class="ms-val-lbl">${val} ${met.unit}</span>`:''}</div><span class="ms-badge ${cls}">${txt}</span></div>`;
  }).join('');
  const overall=Math.round((p*0.5)+(hit/METRICS.length)*50);
  let h=`
    <div class="coach-hero">
      <div class="coach-top">
        <div class="coach-av">🤖</div>
        <div><div class="coach-title-txt">Health Coach</div><div class="coach-sub">Day ${day} of 30 · AI-powered daily review</div></div>
      </div>
      <div class="coach-scores">
        <div class="coach-sc"><div class="coach-sc-n">${p}%</div><div class="coach-sc-l">Tasks done</div></div>
        <div class="coach-sc"><div class="coach-sc-n">${overall}%</div><div class="coach-sc-l">Overall score</div></div>
        <div class="coach-sc"><div class="coach-sc-n">${hit}/${METRICS.length}</div><div class="coach-sc-l">Targets hit</div></div>
      </div>
    </div>
    <div class="met-status-list">${rows}</div>`;
  if(!state.apiKey){
    h+=`<div class="coach-no-key">🔑 Add your API key in the <strong>Log</strong> tab to unlock AI coaching summaries.</div>`;
  }else{
    h+=`<button class="gen-btn" onclick="generateCoach()" id="gen-btn">🤖 Generate Today's Coach Summary</button>`;
  }
  if(saved){h+=`<div class="summary-card"><div class="summary-lbl">Today's Coach Summary</div><div class="summary-body">${saved}</div></div>`;}
  h+=`<div id="coach-out"></div>`;
  document.getElementById('coach-content').innerHTML=h;
}

async function generateCoach(){
  const btn=document.getElementById('gen-btn'),out=document.getElementById('coach-out');
  if(btn){btn.disabled=true;btn.textContent='⏳ Reviewing your day...';}
  const today=todayKey();
  if(state.history[today]){state.history[today].coachSummary='';save();}
  if(out)out.innerHTML=`<div class="coach-loading"><span class="spin">🤖</span><p>Analysing your metrics and tasks...<br>Preparing personalised feedback.</p></div>`;
  const tm=getTM(),p=calcPct(),day=calcDay(),streak=calcStreak(),note=getNote(),dsr=daysSinceRelease();
  const lines=METRICS.map(m=>{const v=tm[m.id]!==undefined?tm[m.id]:'not logged';const s=typeof v==='number'?(v>=m.target?'✓ TARGET MET':`${Math.round((v/m.target)*100)}% of target`):'NOT LOGGED';return`• ${m.name}: ${v} ${m.unit} | Target: ${m.target} ${m.unit} | ${s}`;}).join('\n');
  const rc=dsr!==null?`• Days since last release: ${dsr} (optimal: 2–4 days for max volume)`:'• Last release: not recorded';
  const prompt=`You are a warm, expert men's health coach specialising in reproductive health optimisation. Reviewing Jimmy's Day ${day} of his 30-day program to optimise reproductive health and improve taste.\n\nTODAY:\n• Tasks: ${p}%\n• Streak: ${streak} days\n• Day: ${day}/30\n${rc}\n\nMETRICS:\n${lines}\n${note?`\nJimmy's note: "${note}"`:''}

Write a personalised end-of-day coaching summary:\n\n🌟 OVERALL ASSESSMENT\n2-3 honest, warm sentences.\n\n✅ TODAY'S WINS\nSpecific wins linked to volume/taste goals.\n\n⚠️ NEEDS IMPROVEMENT\nWhat fell short and why it matters.\n\n💡 TOMORROW'S TOP 3 PRIORITIES\nThree specific, actionable things.\n\n🔬 HEALTH INSIGHT\nOne science fact linking today's choices to reproductive health or taste.\n\n💪 COACH'S MESSAGE\nBrief, warm, personalised motivating close.\n\nBe specific — reference his actual numbers. ~350 words.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API error');}
    const data=await resp.json();
    const summary=data.content[0].text;
    if(!state.history[today])state.history[today]={pct:p,metrics:{},note:'',coachSummary:''};
    state.history[today].coachSummary=summary;save();
    if(out)out.innerHTML=`<div class="summary-card"><div class="summary-lbl">Today's Coach Summary</div><div class="summary-body">${summary}</div></div>`;
    if(btn){btn.disabled=false;btn.textContent='🔄 Regenerate Summary';}
  }catch(err){
    if(out)out.innerHTML=`<div style="background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:13px;font-size:0.79rem;color:var(--red);">⚠️ ${err.message}</div>`;
    if(btn){btn.disabled=false;btn.textContent='🤖 Generate Today\'s Coach Summary';}
  }
}

// ── UTILS ────────────────────────────────────────────────────
function resetToday(){Object.keys(state.checked).forEach(k=>delete state.checked[k]);const t=todayKey();if(state.history[t])state.history[t].pct=0;save();renderToday();updateHeader();}
function confirmClear(){if(confirm('Clear all history? Cannot be undone.')){state.history={};state.startDate=todayKey();save();renderHistory();}}

// ── INIT ─────────────────────────────────────────────────────
(function testStorage(){
  try{localStorage.setItem('_t','1');const ok=localStorage.getItem('_t')==='1';localStorage.removeItem('_t');if(!ok)throw new Error();}
  catch(e){setTimeout(()=>{const h=document.querySelector('.hdr-sub');if(h){h.textContent='⚠️ Open in Safari for data to save';h.style.color='#fef08a';}},100);}
})();
load();
updateHeader();
renderToday();
</script>
